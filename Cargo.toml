[workspace]
members = [
  "crates/docnav",
  "crates/docnav-adapter-contracts",
  "crates/docnav-cli-args",
  "crates/docnav-diagnostics",
  "crates/docnav-json-io",
  "crates/docnav-output",
  "crates/docnav-markdown",
  "crates/docnav-navigation",
  "crates/docnav-protocol",
  "crates/docnav-readable",
  "crates/docnav-parameter-resolution",
  "crates/docnav-typed-fields",
  "crates/docnav-typed-fields-macros"
]
resolver = "2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
clap = { version = "4.5.40", default-features = false, features = ["std", "help", "usage"] }
docnav-protocol = { path = "crates/docnav-protocol" }
docnav-adapter-contracts = { path = "crates/docnav-adapter-contracts" }
docnav-cli-args = { path = "crates/docnav-cli-args" }
docnav-diagnostics = { path = "crates/docnav-diagnostics" }
docnav-json-io = { path = "crates/docnav-json-io" }
docnav-markdown = { path = "crates/docnav-markdown" }
docnav-navigation = { path = "crates/docnav-navigation" }
docnav-output = { path = "crates/docnav-output" }
docnav-readable = { path = "crates/docnav-readable" }
docnav-parameter-resolution = { path = "crates/docnav-parameter-resolution" }
docnav-typed-fields = { path = "crates/docnav-typed-fields" }
docnav-typed-fields-macros = { path = "crates/docnav-typed-fields-macros" }
jsonschema = { version = "0.46.5", default-features = false }
pulldown-cmark = "0.13.4"
regex = "1.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
