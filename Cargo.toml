[workspace]
members = [
  "crates/docnav-adapter-sdk",
  "crates/docnav-protocol"
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
docnav-protocol = { path = "crates/docnav-protocol" }
jsonschema = { version = "0.46.5", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
