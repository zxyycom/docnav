schema: spec-driven

context: |
  Docnav is a Rust project for navigating large structured documents through
  outline -> ref -> read.
  It uses a stdio MCP gateway and independently installable format adapters.
  Shared protocol schemas must remain stable and format-specific parsing must
  remain inside the corresponding adapter.

rules:
  proposal:
    - State the affected executable, adapter, shared library, or protocol surface.
    - Include explicit non-goals when the change could expand across adapters.
  design:
    - Describe protocol compatibility and process-boundary effects.
    - Keep docnav-mcp format-agnostic.
  tasks:
    - Include automated verification for changed protocol and invocation behavior.
