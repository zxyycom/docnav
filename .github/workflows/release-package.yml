name: Release package

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  package:
    name: Build release package (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Bootstrap mise and Bun
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.5
          install_args: bun node pnpm rust
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Add Rust target
        run: mise exec -- rustup target add "${{ matrix.target }}"

      - name: Resolve package layout
        id: info
        run: bun run info:docnav-package -- --target "${{ matrix.target }}"

      - name: Build release package
        run: bun run package:docnav -- --target "${{ matrix.target }}"

      - name: Smoke release package
        run: bun run smoke:docnav-package -- --manifest "${{ steps.info.outputs.manifest_path }}" --expect-producer-kind github-actions --expect-source-dirty false

      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docnav-v${{ steps.info.outputs.version }}-${{ matrix.target }}
          path: "${{ steps.info.outputs.package_dir }}"
          if-no-files-found: error
