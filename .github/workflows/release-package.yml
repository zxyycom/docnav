name: Release package

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  package:
    name: Build release package (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Add Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Resolve package layout
        id: info
        run: bun run info:docnav-package -- --target "${{ matrix.target }}"

      - name: Build release package
        run: bun run package:docnav -- --target "${{ matrix.target }}"

      - name: Verify release package
        run: bun run verify:docnav-package -- --manifest "${{ steps.info.outputs.manifest_path }}" --expect-producer-kind github-actions --expect-source-dirty false

      - name: Smoke release package
        run: bun run smoke:docnav-package -- --manifest "${{ steps.info.outputs.manifest_path }}" --expect-producer-kind github-actions --expect-source-dirty false

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: docnav-v${{ steps.info.outputs.version }}-${{ matrix.target }}
          path: "${{ steps.info.outputs.package_dir }}"
          if-no-files-found: error
