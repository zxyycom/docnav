name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify workspace
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt, rust-src

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check OpenSpec CLI
        run: bun run openspec --version

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install quality tools
        run: |
          uv venv "$RUNNER_TEMP/docnav-quality-venv"
          uv pip install --python "$RUNNER_TEMP/docnav-quality-venv/bin/python" lizard
          "$RUNNER_TEMP/docnav-quality-venv/bin/python" -m lizard --version
          echo "DOCNAV_LIZARD_CMD=$RUNNER_TEMP/docnav-quality-venv/bin/python" >> "$GITHUB_ENV"
          # Keep this pinned to the CSV contract asserted by scripts/tools/quality/tools/scc.mjs.
          go install github.com/boyter/scc/v3@v3.7.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          export PATH="$(go env GOPATH)/bin:$PATH"
          scc --version
          pnpm exec jscpd --version

      - name: Verify workspace
        run: bun run verify:docnav-workspace

      - name: Render quality warning annotations
        if: always()
        run: bun run quality:annotate

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-report
          path: artifacts/docnav-quality/

      - name: Write step summary
        if: always()
        run: |
          if [ -f artifacts/docnav-quality/report.md ]; then
            echo "# Code Quality Observability" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -s artifacts/docnav-quality/warnings-all.ndjson ]; then
              echo "**Status: warning**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Quality warnings were generated. The first non-info warning annotations are shown on this run; full details are in \`artifacts/docnav-quality/report.md\`." >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status: passed**" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Warning records do not cause CI failure; quality scan execution/config/output failures still fail this job. Clippy remains the Rust blocking lint gate.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            tail -n +2 artifacts/docnav-quality/report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "# Code Quality Observability" >> $GITHUB_STEP_SUMMARY
            echo "No report generated." >> $GITHUB_STEP_SUMMARY
          fi
