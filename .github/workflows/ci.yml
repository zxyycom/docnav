name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      PNPM_HOME: /home/runner/.local/share/pnpm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure pnpm global bin
        run: echo "$PNPM_HOME" >> "$GITHUB_PATH"

      - name: Install OpenSpec CLI
        run: pnpm add --global @fission-ai/openspec@1.3.1

      - name: Check OpenSpec CLI
        run: openspec --version

      - name: Verify workspace
        run: pnpm run verify:docnav-workspace
