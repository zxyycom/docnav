name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify workspace
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt, rust-src

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.3

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check OpenSpec CLI
        run: bun run openspec --version

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
          cache: false

      - name: Install quality tools
        run: |
          uv venv "$RUNNER_TEMP/docnav-quality-venv"
          uv pip install --python "$RUNNER_TEMP/docnav-quality-venv/bin/python" "lizard==1.23.0"
          "$RUNNER_TEMP/docnav-quality-venv/bin/python" -m lizard --version
          echo "DOCNAV_LIZARD_CMD=$RUNNER_TEMP/docnav-quality-venv/bin/python" >> "$GITHUB_ENV"
          # Keep this pinned to the CSV contract asserted by scripts/tools/quality/tools/scc.mjs.
          go install github.com/boyter/scc/v3@v3.7.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          export PATH="$(go env GOPATH)/bin:$PATH"
          scc --version
          pnpm exec jscpd --version

      - name: Verify workspace
        run: bun run verify:docnav-workspace

      - name: Render quality warning annotations
        if: always()
        run: bun run quality:annotate

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-quality-report
          path: artifacts/docnav-quality/

      - name: Write step summary
        if: always()
        run: |
          if [ -f artifacts/docnav-quality/report.md ]; then
            echo "# Code Quality Observability" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -s artifacts/docnav-quality/warnings-all.ndjson ]; then
              echo "**Status: warning**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Quality warnings were generated. The first unaccepted non-info warning annotations are shown on this run; full details are in \`artifacts/docnav-quality/report.md\`." >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status: passed**" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Warning records do not cause CI failure; quality scan execution/config/output failures still fail this job. Clippy remains the Rust blocking lint gate.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            tail -n +2 artifacts/docnav-quality/report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "# Code Quality Observability" >> $GITHUB_STEP_SUMMARY
            echo "No report generated." >> $GITHUB_STEP_SUMMARY
          fi
